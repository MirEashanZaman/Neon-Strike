<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Strike</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      font-family: 'Courier New', monospace;
    }

    canvas {
      display: block;
    }

    #ui {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 14px 24px;
      pointer-events: none;
      color: #00ffe7;
      letter-spacing: 2px;
      text-transform: uppercase;
      z-index: 10;
    }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .label {
      font-size: 10px;
      color: #004d45;
    }

    .val {
      font-size: 20px;
      font-weight: bold;
      color: #00ffe7;
      text-shadow: 0 0 8px #00ffe7;
    }

    #health-bar {
      width: 130px;
      height: 6px;
      background: #001a18;
      border: 1px solid #00ffe7;
      margin-top: 4px;
      overflow: hidden;
    }

    #health-fill {
      height: 100%;
      background: #00ffe7;
      transition: width 0.1s;
      box-shadow: 0 0 6px #00ffe7;
    }

    #combo-display {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      letter-spacing: 4px;
      color: #ffaa00;
      text-shadow: 0 0 10px #ffaa00;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 11;
    }

    #pause-btn {
      position: fixed;
      top: 56px;
      right: 24px;
      background: transparent;
      border: 1px solid #00ffe744;
      color: #00ffe7;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      padding: 6px 14px;
      cursor: pointer;
      z-index: 11;
      text-transform: uppercase;
      transition: all 0.2s;
      display: none;
    }

    #pause-btn:hover {
      border-color: #00ffe7;
      background: #00ffe710;
    }

    .screen {
      position: fixed;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: transparent;
      color: #00ffe7;
      text-align: center;
      z-index: 20;
      gap: 0;
    }

    .screen.active {
      display: flex;
    }

    .menu-panel {
      background: rgba(0, 5, 20, 0.75);
      border: 1px solid #00ffe718;
      padding: 40px 50px 36px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      position: relative;
      box-shadow: 0 0 60px rgba(0, 255, 231, 0.08), inset 0 0 40px rgba(0, 40, 80, 0.4);
    }

    .menu-panel::before {
      content: '';
      position: absolute;
      inset: -1px;
      background: linear-gradient(135deg, #00ffe720, transparent 40%, transparent 60%, #0088ff18);
      pointer-events: none;
    }

    .screen h1 {
      font-size: 52px;
      letter-spacing: 12px;
      text-transform: uppercase;
      text-shadow: 0 0 30px #00ffe7, 0 0 60px #0088ff, 0 0 100px #0044ff;
      animation: titlePulse 3s ease-in-out infinite;
      margin-bottom: 4px;
    }

    .menu-btn {
      display: block;
      width: 260px;
      padding: 13px 0;
      margin: 6px auto;
      background: rgba(0, 255, 231, 0.03);
      border: 1px solid #00ffe730;
      color: #00ffe7aa;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      letter-spacing: 4px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.25s;
      position: relative;
      overflow: hidden;
    }

    .menu-btn::before {
      content: '';
      position: absolute;
      left: -100%;
      top: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0, 255, 231, 0.1), transparent);
      transition: left 0.4s;
    }

    .menu-btn:hover::before {
      left: 100%;
    }

    .menu-btn:hover {
      background: rgba(0, 255, 231, 0.08);
      border-color: #00ffe7;
      color: #00ffe7;
      box-shadow: 0 0 20px rgba(0, 255, 231, 0.2);
      letter-spacing: 5px;
    }

    .menu-btn.red {
      border-color: #ff446630;
      color: #ff446688;
    }

    .menu-btn.red:hover {
      background: rgba(255, 68, 102, 0.08);
      border-color: #ff4466;
      color: #ff4466;
      box-shadow: 0 0 20px rgba(255, 68, 102, 0.2);
    }

    .back-btn {
      margin-top: 18px;
      background: transparent;
      border: none;
      color: #00ffe733;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      cursor: pointer;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .back-btn:hover {
      color: #00ffe7;
    }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 310px;
      margin: 9px auto;
    }

    .s-label {
      font-size: 11px;
      letter-spacing: 2px;
      color: #00ffe7aa;
      text-transform: uppercase;
    }

    .s-val {
      font-size: 12px;
      color: #00ffe7;
      min-width: 36px;
      text-align: right;
    }

    input[type=range] {
      -webkit-appearance: none;
      width: 130px;
      height: 4px;
      background: #00ffe730;
      outline: none;
      border-radius: 2px;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      background: #00ffe7;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 6px #00ffe7;
    }

    .tog {
      background: transparent;
      border: 1px solid #00ffe740;
      color: #00ffe766;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      padding: 4px 12px;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
    }

    .tog.on {
      background: #00ffe720;
      border-color: #00ffe7;
      color: #00ffe7;
    }

    .tog:hover {
      border-color: #00ffe7;
    }

    .char-grid {
      display: flex;
      gap: 14px;
      margin: 0 auto 18px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .char-card {
      width: 108px;
      padding: 12px 8px 10px;
      position: relative;
      border: 1px solid #00ffe728;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .char-card:hover {
      border-color: #00ffe7;
      background: #00ffe708;
    }

    .char-card.sel {
      border-color: #00ffe7;
      background: #00ffe712;
      box-shadow: 0 0 16px #00ffe740;
    }

    .char-name {
      font-size: 10px;
      letter-spacing: 2px;
      color: #00ffe7;
      text-transform: uppercase;
    }

    .char-desc {
      font-size: 9px;
      color: #00ffe766;
      margin-top: 3px;
      letter-spacing: 1px;
    }

    #music-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 20px;
      background: #000510dd;
      border-top: 1px solid #00ffe714;
      z-index: 12;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s;
    }

    #music-bar.on {
      opacity: 1;
      pointer-events: all;
    }

    #music-track {
      font-size: 10px;
      letter-spacing: 2px;
      color: #00ffe755;
      flex: 1;
      text-transform: uppercase;
    }

    #music-status {
      font-size: 10px;
      color: #00ffe744;
      letter-spacing: 1px;
    }

    #viz {
      display: flex;
      gap: 2px;
      align-items: flex-end;
      height: 16px;
    }

    .vb {
      width: 3px;
      background: #00ffe7;
      border-radius: 1px;
      animation: vz 0.5s ease infinite alternate;
    }

    #wave-announce {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 30px;
      letter-spacing: 8px;
      color: #ff4466;
      text-shadow: 0 0 24px #ff4466;
      text-transform: uppercase;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s;
      z-index: 15;
    }

    .corner {
      position: absolute;
      width: 16px;
      height: 16px;
      border-color: #00ffe7;
      border-style: solid;
    }

    .corner.tl {
      top: -1px;
      left: -1px;
      border-width: 2px 0 0 2px;
    }

    .corner.tr {
      top: -1px;
      right: -1px;
      border-width: 2px 2px 0 0;
    }

    .corner.bl {
      bottom: -1px;
      left: -1px;
      border-width: 0 0 2px 2px;
    }

    .corner.br {
      bottom: -1px;
      right: -1px;
      border-width: 0 2px 2px 0;
    }

    .title-line {
      width: 200px;
      height: 1px;
      margin: 0 auto 6px;
      background: linear-gradient(90deg, transparent, #00ffe7, transparent);
    }

    .subtitle {
      font-size: 10px;
      letter-spacing: 6px;
      color: #00ffe744;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.6
      }
    }

    @keyframes titlePulse {

      0%,
      100% {
        text-shadow: 0 0 30px #00ffe7, 0 0 60px #0088ff, 0 0 100px #0044ff;
      }

      50% {
        text-shadow: 0 0 50px #00ffe7, 0 0 100px #00aaff, 0 0 160px #0088ff, 0 0 200px #0044ff;
      }
    }

    @keyframes vz {
      0% {
        height: 2px
      }

      100% {
        height: 14px
      }
    }
  </style>
</head>

<body>
  <canvas id="gameCanvas"></canvas>
  <div id="ui">
    <div class="stat"><span class="label">Score</span><span class="val" id="score-val">0</span></div>
    <div class="stat" style="align-items:center;"><span class="label">Wave</span><span class="val"
        id="wave-val">1</span></div>
    <div class="stat" style="align-items:flex-end;"><span class="label">Health</span>
      <div id="health-bar">
        <div id="health-fill"></div>
      </div>
    </div>
  </div>
  <div id="combo-display"></div>
  <button id="pause-btn">&#10074;&#10074; Pause</button>

  <div id="s-main" class="screen active">
    <div class="menu-panel">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
      <h1>Neon Strike</h1>
      <div class="title-line"></div>
      <p class="subtitle">Mir Eashan Zaman</p>
      <button class="menu-btn" onclick="startGame()">[ Start Game ]</button>
      <button class="menu-btn" onclick="showScreen('s-char')">[ Select Ship ]</button>
      <button class="menu-btn" onclick="showScreen('s-settings')">[ Settings ]</button>
      <button class="menu-btn red" onclick="window.close()">[ Quit ]</button>
    </div>
  </div>

  <div id="s-pause" class="screen">
    <div class="menu-panel">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
      <h1 style="font-size:32px;letter-spacing:8px;">Paused</h1>
      <div class="title-line"></div>
      <p id="pause-info" class="subtitle"></p>
      <button class="menu-btn" onclick="resumeGame()">[ Resume ]</button>
      <button class="menu-btn" onclick="showScreen('s-settings',true)">[ Settings ]</button>
      <button class="menu-btn red" onclick="quitToMenu()">[ Quit to Menu ]</button>
    </div>
  </div>

  <div id="s-over" class="screen">
    <div class="menu-panel">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
      <h1 style="font-size:40px;color:#ff4466;text-shadow:0 0 30px #ff4466,0 0 60px #ff0044,0 0 100px #aa0022;">Game
        Over</h1>
      <div class="title-line" style="background:linear-gradient(90deg,transparent,#ff4466,transparent);"></div>
      <p id="go-score" style="font-size:15px;color:#ff446688;letter-spacing:3px;margin-top:12px;margin-bottom:4px;"></p>
      <p id="go-wave" style="font-size:11px;color:#00ffe744;letter-spacing:2px;margin-bottom:4px;"></p>
      <p id="go-combo" style="font-size:11px;color:#ffaa0088;letter-spacing:2px;margin-bottom:24px;"></p>
      <button class="menu-btn" onclick="startGame()">[ Play Again ]</button>
      <button class="menu-btn red" onclick="quitToMenu()">[ Main Menu ]</button>
    </div>
  </div>

  <div id="s-char" class="screen">
    <div class="menu-panel" style="width:560px;max-width:96vw;">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
      <h1 style="font-size:28px;letter-spacing:8px;">Select Ship</h1>
      <div class="title-line"></div>
      <p class="subtitle">Each ship has unique stats</p>
      <div class="char-grid" id="char-grid" style="max-width:520px;"></div>
      <div style="margin:4px auto 14px;text-align:center;">
        <p style="font-size:10px;letter-spacing:3px;color:#00ffe766;margin-bottom:8px;text-transform:uppercase;">Ship
          Color</p>
        <div id="color-swatches" style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;min-height:26px;">
        </div>
        <div style="display:flex;align-items:center;gap:10px;justify-content:center;margin-top:8px;">
          <span style="font-size:10px;letter-spacing:2px;color:#00ffe766;">Custom:</span>
          <input type="color" id="custom-color" value="#00ffe7"
            style="width:36px;height:24px;border:1px solid #00ffe740;background:transparent;cursor:pointer;padding:0;">
          <button onclick="applyCustomColor()"
            style="background:transparent;border:1px solid #00ffe740;color:#00ffe7aa;font-family:'Courier New',monospace;font-size:10px;letter-spacing:2px;padding:4px 10px;cursor:pointer;text-transform:uppercase;">Apply</button>
        </div>
      </div>
      <button class="menu-btn" onclick="confirmChar()">[ Confirm ]</button>
      <button class="back-btn" id="char-back">← Back</button>
    </div>
  </div>

  <div id="s-settings" class="screen">
    <div class="menu-panel">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
      <h1 style="font-size:28px;letter-spacing:8px;">Settings</h1>
      <div class="title-line"></div>
      <p class="subtitle">Adjust audio &amp; gameplay</p>
      <div class="setting-row"><span class="s-label">Music Vol</span><input type="range" id="sl-music" min="0" max="100"
          value="60"><span class="s-val" id="sl-music-v">60</span></div>
      <div class="setting-row"><span class="s-label">SFX Vol</span><input type="range" id="sl-sfx" min="0" max="100"
          value="70"><span class="s-val" id="sl-sfx-v">70</span></div>
      <div class="setting-row"><span class="s-label">Music</span><button class="tog on" id="tog-music"
          onclick="toggleMusic()">ON</button></div>
      <div class="setting-row"><span class="s-label">Particles</span><button class="tog on" id="tog-parts"
          onclick="toggleParts()">ON</button></div>
      <div class="setting-row"><span class="s-label">Difficulty</span>
        <div style="display:flex;gap:5px;"><button class="tog" id="d-easy"
            onclick="setDiff('easy')">Easy</button><button class="tog on" id="d-normal"
            onclick="setDiff('normal')">Normal</button><button class="tog" id="d-hard"
            onclick="setDiff('hard')">Hard</button></div>
      </div>
      <button class="back-btn" id="settings-back">← Back</button>
    </div>
  </div>

  <div id="wave-announce"></div>
  <div id="music-bar">
    <div id="viz"></div><span id="music-track">Track 01 — Neon Grid</span><span id="music-status">▶ Playing</span>
  </div>

  <script>
    // ── Canvas ──────────────────────────────────────────────────
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let W, H;
    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', () => { resize(); initBG(); });

    // ── DOM Cache ───────────────────────────────────────────────
    const DOM = {
      score: document.getElementById('score-val'),
      wave: document.getElementById('wave-val'),
      hFill: document.getElementById('health-fill'),
      wAnn: document.getElementById('wave-announce'),
      combo: document.getElementById('combo-display'),
      pauseBtn: document.getElementById('pause-btn'),
      pauseInf: document.getElementById('pause-info'),
      goScore: document.getElementById('go-score'),
      goWave: document.getElementById('go-wave'),
      goCombo: document.getElementById('go-combo'),
      musicTrk: document.getElementById('music-track'),
      musicSt: document.getElementById('music-status'),
      musicBar: document.getElementById('music-bar'),
    };

    // ── Audio ───────────────────────────────────────────────────
    let AC, masterGain, musicGain, sfxGain, musicEnabled = true, musicNodes = [], currentTrack = 0;
    let noiseBuffer = null;
    const SFX_THROTTLE = {};
    const TRACKS = [
      { name: 'Track 01 — Neon Grid', bpm: 128, wave: 'square' },
      { name: 'Track 02 — Void Runner', bpm: 140, wave: 'sawtooth' },
      { name: 'Track 03 — Pulse Wave', bpm: 120, wave: 'triangle' },
    ];

    function initAC() {
      if (AC) return;
      AC = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = AC.createGain(); masterGain.gain.value = 1;
      musicGain = AC.createGain(); musicGain.gain.value = cfg.musicVol / 100;
      sfxGain = AC.createGain(); sfxGain.gain.value = cfg.sfxVol / 100;
      musicGain.connect(masterGain); sfxGain.connect(masterGain); masterGain.connect(AC.destination);
      // pre-generate noise buffer once
      noiseBuffer = AC.createBuffer(1, AC.sampleRate * 0.07, AC.sampleRate);
      const d = noiseBuffer.getChannelData(0);
      for (let i = 0; i < d.length; i++)d[i] = (Math.random() * 2 - 1) * Math.exp(-i / 500);
    }

    function playMusic(idx) {
      if (!AC) return; stopMusic(); if (!musicEnabled) return;
      currentTrack = idx % TRACKS.length;
      const tr = TRACKS[currentTrack];
      DOM.musicTrk.textContent = tr.name; DOM.musicSt.textContent = '▶ Playing';
      const beat = 60 / tr.bpm;
      const loop = () => {
        if (!musicEnabled || !AC) return;
        const now = AC.currentTime;
        [261.63, 329.63, 392, 523.25, 440, 392, 329.63, 261.63].forEach((f, i) => {
          const o = AC.createOscillator(), g = AC.createGain();
          o.type = tr.wave; o.frequency.value = f;
          g.gain.setValueAtTime(0.12, now + i * beat); g.gain.exponentialRampToValueAtTime(0.001, now + i * beat + beat * 0.8);
          o.connect(g); g.connect(musicGain); o.start(now + i * beat); o.stop(now + i * beat + beat); musicNodes.push(o);
        });
        [65.41, 65.41, 73.42, 65.41].forEach((f, i) => {
          const o = AC.createOscillator(), g = AC.createGain();
          o.type = 'sawtooth'; o.frequency.value = f;
          g.gain.setValueAtTime(0.16, now + i * beat * 2); g.gain.exponentialRampToValueAtTime(0.001, now + i * beat * 2 + beat * 1.6);
          o.connect(g); g.connect(musicGain); o.start(now + i * beat * 2); o.stop(now + i * beat * 2 + beat * 2); musicNodes.push(o);
        });
        musicNodes._t = setTimeout(loop, beat * 8 * 1000);
      };
      loop(); DOM.musicBar.classList.add('on');
    }

    function stopMusic() {
      if (!AC) return;
      musicNodes.forEach(n => { try { n.stop(); } catch (e) { } });
      if (musicNodes._t) clearTimeout(musicNodes._t);
      musicNodes = [];
    }

    function toggleMusic() {
      musicEnabled = !musicEnabled;
      const b = document.getElementById('tog-music');
      b.textContent = musicEnabled ? 'ON' : 'OFF'; b.classList.toggle('on', musicEnabled);
      DOM.musicSt.textContent = musicEnabled ? '▶ Playing' : '■ Off';
      if (musicEnabled) playMusic(currentTrack); else stopMusic();
    }

    function playSFX(type) {
      if (!AC || cfg.sfxVol === 0) return;
      const now = AC.currentTime;
      if (SFX_THROTTLE[type] && now - SFX_THROTTLE[type] < 0.07) return;
      SFX_THROTTLE[type] = now;
      if (AC.state === 'suspended') AC.resume();
      const vol = cfg.sfxVol / 100;
      try {
        if (type === 'shoot') {
          const o = AC.createOscillator(), g = AC.createGain();
          o.type = 'square'; o.frequency.setValueAtTime(600, now); o.frequency.exponentialRampToValueAtTime(160, now + 0.06);
          g.gain.setValueAtTime(0.15 * vol, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
          o.connect(g); g.connect(sfxGain); o.start(now); o.stop(now + 0.07);
        } else if (type === 'hit') {
          const s = AC.createBufferSource(), g = AC.createGain();
          s.buffer = noiseBuffer; g.gain.setValueAtTime(0.25 * vol, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
          s.connect(g); g.connect(sfxGain); s.start(now);
        } else if (type === 'die') {
          const o = AC.createOscillator(), g = AC.createGain();
          o.type = 'sawtooth'; o.frequency.setValueAtTime(300, now); o.frequency.exponentialRampToValueAtTime(55, now + 0.45);
          g.gain.setValueAtTime(0.3 * vol, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.45);
          o.connect(g); g.connect(sfxGain); o.start(now); o.stop(now + 0.45);
        } else if (type === 'wave') {
          const o = AC.createOscillator(), g = AC.createGain();
          o.type = 'square'; o.frequency.setValueAtTime(523, now); o.frequency.setValueAtTime(784, now + 0.1);
          g.gain.setValueAtTime(0.14 * vol, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.22);

    function drawBG() {

          ctx.strokeStyle = `rgba(180,220,255,${ta * 0.4})`; ctx.lineWidth = 0.5; const fl = s.r * 4;

        } else { ctx.globalAlpha = ta; ctx.fillStyle = s.layer === 1 ? 'rgba(200,220,255,1)' : 'rgba(160,190,255,1)'; ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill(); ctx.globalAlpha = 1; }

    function updateBoss() {
      if (!boss || !bossActive) return;
      const b = boss;
      if (!b.phase2 && b.hp <= b.p2hp) {
        b.phase2 = true; b.sRate = Math.max(12, Math.floor(b.sRate * 0.55)); b.bCount = Math.floor(b.bCount * 1.6);
        spawnParts(b.x, b.y, b.color, 20); showWaveAnnounce(b.name + ' PHASE 2!');
      }
      if (b.pattern === 'orbit') { b.orbitA += 0.014; b.x += (W / 2 + Math.cos(b.orbitA) * 190 - b.x) * .04; b.y += (H / 2 + Math.sin(b.orbitA) * 130 - b.y) * .04; }
      else if (b.pattern === 'chase') { const a = Math.atan2(player.y - b.y, player.x - b.x); b.x += Math.cos(a) * b.speed * .7; b.y += Math.sin(a) * b.speed * .7; }
      else if (b.pattern === 'teleport') {
        b.teleTimer++;
        if (b.teleTimer > 160) { b.teleTimer = 0; b.x = 80 + Math.random() * (W - 160); b.y = 60 + Math.random() * (H * .5); spawnParts(b.x, b.y, b.color, 16); }
        const a = Math.atan2(player.y - b.y, player.x - b.x); b.x += Math.cos(a) * b.speed * .5; b.y += Math.sin(a) * b.speed * .5;
      } else if (b.pattern === 'all') {
        b.orbitA += 0.009; const tx = W / 2 + Math.cos(b.orbitA) * (b.phase2 ? 90 : 200), ty = H / 2 + Math.sin(b.orbitA) * (b.phase2 ? 70 : 140);
        b.x += (tx - b.x) * .035; b.y += (ty - b.y) * .035;
        if (b.phase2) { const a = Math.atan2(player.y - b.y, player.x - b.x); b.x += Math.cos(a) * b.speed * .5; b.y += Math.sin(a) * b.speed * .5; }
      } else if (b.pattern === 'spiral') {

        b.x += (W / 2 + Math.cos(b.orbitA) * b.spiralR - b.x) * .05; b.y += (H / 2 + Math.sin(b.orbitA) * b.spiralR * .7 - b.y) * .05;

        b.sTimer = 0; const base = Math.atan2(player.y - b.y, player.x - b.x);
        b.spiralShot = (b.spiralShot || 0) + 0.3;
        if (b.pattern === 'orbit' || b.pattern === 'all') {
          for (let i = 0; i < b.bCount; i++) { const a = (i / b.bCount) * Math.PI * 2; bossBullets.push({ x: b.x, y: b.y, vx: Math.cos(a) * b.bSpd, vy: Math.sin(a) * b.bSpd, r: 5, color: b.color }); }

            for (let i = 0; i < 3; i++) {

            }

        } else {
          const spread = b.phase2 ? .4 : .28;
          for (let i = 0; i < b.bCount; i++) { const a = base + (i - (b.bCount - 1) / 2) * spread / b.bCount; bossBullets.push({ x: b.x, y: b.y, vx: Math.cos(a) * b.bSpd, vy: Math.sin(a) * b.bSpd, r: 5, color: b.color }); }
        }

        const bb = bossBullets[i]; bb.x += bb.vx; bb.y += bb.vy;
        if (bb.x < -20 || bb.x > W + 20 || bb.y < -20 || bb.y > H + 20) { bossBullets.splice(i, 1); continue; }
        if (dist(bb, player) < bb.r + player.r && player.invincible <= 0 && activePU.shield <= 0) {
          health -= 15; player.invincible = 40; spawnParts(player.x, player.y, '#ff4466', 6); bossBullets.splice(i, 1);
          triggerShake(5, 12); updateHealthBar(); if (health <= 0) { endGame(); return; }
        }
      }
      // boss collision
      if (dist(b, player) < b.r + player.r && player.invincible <= 0 && activePU.shield <= 0) {
        health -= 28; player.invincible = 60; spawnParts(player.x, player.y, '#ff4466', 10);
        triggerShake(8, 16); updateHealthBar(); if (health <= 0) { endGame(); return; }
      }
      // player bullets hit boss
      for (let i = bullets.length - 1; i >= 0; i--) {
        if (dist(bullets[i], b) < bullets[i].r + b.r) {
          b.hp--; spawnParts(b.x + (Math.random() - .5) * b.r, b.y + (Math.random() - .5) * b.r, b.color, 3); bullets.splice(i, 1);
          if (b.hp <= 0) {
            score += b.score; scoreDirty = true;
            spawnParts(b.x, b.y, b.color, 35);
            // drop 2 health packs and 2 powerups (reduced)
            for (let j = 0; j < 2; j++)spawnHealthPack(b.x + (Math.random() - .5) * 60, b.y + (Math.random() - .5) * 60);
            for (let j = 0; j < 2; j++)spawnPowerUp(b.x + (Math.random() - .5) * 50, b.y + (Math.random() - .5) * 50);
            bossBullets = []; boss = null; bossActive = false;
            showWaveAnnounce('BOSS DEFEATED! +' + BOSS_DEFS[wave]?.score || ''); playSFX('wave'); break;
          }
        }
      }
    }

    function drawBoss() {
      if (!boss || !bossActive) return;
      const b = boss;
      const g2 = ctx.createRadialGradient(b.x, b.y, b.r * .5, b.x, b.y, b.r * 3);
      g2.addColorStop(0, b.color + '44'); g2.addColorStop(1, b.color + '00');
      ctx.fillStyle = g2; ctx.beginPath(); ctx.arc(b.x, b.y, b.r * 3, 0, Math.PI * 2); ctx.fill();
      ctx.save(); ctx.translate(b.x, b.y); ctx.rotate(b.angle);
      ctx.fillStyle = '#05000f'; ctx.strokeStyle = b.color; ctx.lineWidth = 2.5; ctx.shadowColor = b.color; ctx.shadowBlur = 20;
      const sides = b.phase2 ? 8 : 6; ctx.beginPath();
      for (let i = 0; i < sides; i++) { const a = (i / sides) * Math.PI * 2; i === 0 ? ctx.moveTo(Math.cos(a) * b.r, Math.sin(a) * b.r) : ctx.lineTo(Math.cos(a) * b.r, Math.sin(a) * b.r); }
      ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.strokeStyle = b.color + '88'; ctx.lineWidth = 1; ctx.beginPath(); ctx.arc(0, 0, b.r * .55, 0, Math.PI * 2); ctx.stroke();
      ctx.fillStyle = b.phase2 ? '#fff' : b.color; ctx.shadowBlur = b.phase2 ? 20 : 10; ctx.beginPath(); ctx.arc(0, 0, b.r * .22, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
      // HP bar
      const bw = b.r * 3, bh = 8, bx = b.x - bw / 2, by = b.y - b.r - 24;
      ctx.fillStyle = '#111'; ctx.fillRect(bx, by, bw, bh);
      ctx.fillStyle = b.color; ctx.shadowColor = b.color; ctx.shadowBlur = 6; ctx.fillRect(bx, by, bw * (b.hp / b.maxHp), bh);
      ctx.strokeStyle = b.color + '55'; ctx.lineWidth = 1; ctx.strokeRect(bx, by, bw, bh);
      const p2x = bx + bw * (b.p2hp / b.maxHp); ctx.strokeStyle = '#fff8'; ctx.beginPath(); ctx.moveTo(p2x, by - 2); ctx.lineTo(p2x, by + bh + 2); ctx.stroke();
      ctx.fillStyle = b.color; ctx.font = 'bold 11px Courier New'; ctx.textAlign = 'center'; ctx.shadowBlur = 8;
      ctx.fillText(b.name + (b.phase2 ? ' ★' : ''), b.x, b.y - b.r - 30);
      for (const bb of bossBullets) {
        ctx.save(); ctx.shadowColor = bb.color; ctx.shadowBlur = 10; ctx.fillStyle = bb.color; ctx.beginPath(); ctx.arc(bb.x, bb.y, bb.r, 0, Math.PI * 2); ctx.fill(); ctx.restore();
      }
    }

    // ── Power-ups ────────────────────────────────────────────────
    const PU_TYPES = [
      { type: 'rapid', color: '#00ffff', label: 'RAPID' },
      { type: 'triple', color: '#ffaa00', label: 'TRIPLE' },
      { type: 'shield', color: '#44ff88', label: 'SHIELD' },
      { type: 'bomb', color: '#ff4466', label: 'BOMB' },
      { type: 'magnet', color: '#ff88ff', label: 'MAGNET' },
      { type: 'laser', color: '#ffff00', label: 'LASER' },
      { type: 'freeze', color: '#88ddff', label: 'FREEZE' },
    ];

    function spawnPowerUp(x, y) {
      const p = PU_TYPES[Math.floor(Math.random() * PU_TYPES.length)];
      powerUps.push({ x, y, r: 12, type: p.type, color: p.color, label: p.label, life: 480, pulse: 0 });
    }

    function drawPowerUps() {
      for (const p of powerUps) {
        const fade = p.life < 100 ? p.life / 100 : 1, ps = Math.sin(p.pulse) * 3;
        ctx.save(); ctx.globalAlpha = fade; ctx.shadowColor = p.color; ctx.shadowBlur = 14 + ps;
        ctx.strokeStyle = p.color; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.arc(p.x, p.y, p.r + ps * .5, 0, Math.PI * 2); ctx.stroke();
        ctx.globalAlpha = fade * .7; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = fade * .9; ctx.fillStyle = p.color; ctx.shadowBlur = 6; ctx.font = 'bold 7px Courier New'; ctx.textAlign = 'center';
        ctx.fillText(p.label, p.x, p.y + p.r + 12); ctx.restore();
      }
    }

    function drawActivePU() {
      const PU_COLORS = { rapid: '#00ffff', triple: '#ffaa00', shield: '#44ff88', magnet: '#ff88ff', laser: '#ffff00', freeze: '#88ddff' };
      const PU_MAX = { rapid: 300, triple: 300, shield: 300, magnet: 360, laser: 240, freeze: 200 };
      const active = Object.entries(activePU).filter(([k, v]) => v > 0); if (!active.length) return;
      let ox = W / 2 - active.length * 30;
      for (const [k, v] of active) {
        const col = PU_COLORS[k] || '#00ffe7'; const pct = v / (PU_MAX[k] || 300);
        ctx.save(); ctx.shadowColor = col; ctx.shadowBlur = 8; ctx.strokeStyle = col; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.arc(ox, H - 28, 10, 0, Math.PI * 2); ctx.stroke();
        ctx.fillStyle = col; ctx.globalAlpha = 0.3;
        ctx.beginPath(); ctx.arc(ox, H - 28, 10, -Math.PI / 2, -Math.PI / 2 + pct * Math.PI * 2, false); ctx.lineTo(ox, H - 28); ctx.fill();
        ctx.globalAlpha = 1; ctx.fillStyle = col; ctx.font = 'bold 6px Courier New'; ctx.textAlign = 'center';
        ctx.fillText(k.toUpperCase().slice(0, 3), ox, H - 14); ctx.restore(); ox += 60;
      }
    }

    // ── Game helpers ─────────────────────────────────────────────
    function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }
    function triggerShake(amp, dur) { shake.x = amp; shake.y = amp; shake.dur = dur; }
    function spawnParts(x, y, color, n = 8) {
      if (!cfg.particles) return;
      n = Math.min(n, 400 - particles.length);
      for (let i = 0; i < n; i++) {
        const a = Math.random() * Math.PI * 2, s = Math.random() * 3 + 1;
        particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: 1, color, r: Math.random() * 3 + 1 });
      }
    }
    function spawnHealthPack(x, y) { healthPacks.push({ x, y, r: 10, pulse: 0, life: 400 }); }
    function updateHealthBar() {
      const pct = Math.max(0, health / maxHealth);
      DOM.hFill.style.width = (pct * 100) + '%';
      DOM.hFill.style.background = pct > 0.5 ? player.color : pct > 0.25 ? '#ff9900' : '#ff4466';
    }

    function spawnEnemy() {
      const side = Math.floor(Math.random() * 4); let x, y;
      if (side === 0) { x = Math.random() * W; y = -28; } else if (side === 1) { x = W + 28; y = Math.random() * H; }
      else if (side === 2) { x = Math.random() * W; y = H + 28; } else { x = -28; y = Math.random() * H; }
      const d = diffSpeedMult();
      const rng = Math.random();

      // Enemy pool grows as waves progress
      let type = 'normal';
      if (wave >= 12 && rng < 0.10) type = 'splitter';
      else if (wave >= 10 && rng < 0.12) type = 'sniper';
      else if (wave >= 8 && rng < 0.14) type = 'shield';
      else if (wave >= 6 && rng < 0.16) type = 'zigzag';
      else if (wave >= 4 && rng < 0.18) type = 'heavy';
      else if (wave >= 2 && rng < 0.35) type = 'fast';

      const cfgs = {
        normal: { r: 12, speed: (1.4 + wave * .18) * d, hp: 1, color: '#ff4466', score: 10, shoots: false },
        fast: { r: 8, speed: (3.2 + wave * .12) * d, hp: 1, color: '#ff9900', score: 20, shoots: false },
        heavy: { r: 18, speed: (0.9 + wave * .12) * d, hp: 3, color: '#aa44ff', score: 40, shoots: false },
        zigzag: { r: 10, speed: (2.0 + wave * .14) * d, hp: 1, color: '#ff44ff', score: 30, shoots: false },
        shield: { r: 14, speed: (1.1 + wave * .10) * d, hp: 2, color: '#44aaff', score: 50, shoots: false, shielded: true },
        sniper: { r: 9, speed: (1.6 + wave * .10) * d, hp: 1, color: '#ffff44', score: 35, shoots: true, shootCd: 90 },
        splitter: { r: 20, speed: (0.8 + wave * .08) * d, hp: 4, color: '#ff6600', score: 80, shoots: false, splits: true },
      };
      const c = cfgs[type];
      enemies.push({
        x, y, r: c.r, speed: c.speed, hp: c.hp, maxHp: c.hp, color: c.color, score: c.score,
        type, angle: 0, zigDir: 1, zigTimer: 0, shielded: c.shielded || false,
        shoots: c.shoots || false, shootCd: c.shootCd || 0, shootTimer: Math.floor(Math.random() * 60),
        splits: c.splits || false
      });
    }

    function initGame() {
      const ch = CHARS[selChar];
      score = 0; wave = 1; combo = 0; comboTimer = 0; maxCombo = 0; scoreDirty = true;
      if (!shipColor) shipColor = ch.color;
      maxHealth = Math.round(ch.hp * diffHPMult()); health = maxHealth;
      spawnInterval = 80; spawnTimer = 0; waveCooldown = 0; shootCooldown = 0; packTimer = 0; packInterval = 600;
      player = { x: W / 2, y: H / 2, r: 14, speed: ch.speed, angle: 0, invincible: 0, fireRate: ch.fireRate, color: getCurrentColor(), shape: ch.shape };
      bullets = []; enemies = []; particles = []; healthPacks = []; powerUps = []; bossBullets = [];
      activePU = { rapid: 0, triple: 0, shield: 0, magnet: 0, laser: 0, freeze: 0 }; boss = null; bossActive = false;
      mouse = { x: W / 2, y: H / 2 }; initBG();
      DOM.wave.textContent = '1'; DOM.hFill.style.width = '100%'; DOM.hFill.style.background = getCurrentColor();
    }

    function shootBullet() {
      const spd = 9;
      const shoot = a => bullets.push({ x: player.x, y: player.y, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd, r: 4, color: player.color });
      if (activePU.laser > 0) {
        // laser: wide fast piercing bullet
        bullets.push({ x: player.x, y: player.y, vx: Math.cos(player.angle) * 16, vy: Math.sin(player.angle) * 16, r: 7, color: '#ffff44', piercing: true, pierceCt: 0 });
      } else if (activePU.triple > 0) { shoot(player.angle); shoot(player.angle + 0.26); shoot(player.angle - 0.26); }
      else shoot(player.angle);
      spawnParts(player.x + Math.cos(player.angle) * 16, player.y + Math.sin(player.angle) * 16, player.color, 2);
      shootCooldown = activePU.rapid > 0 ? Math.max(2, Math.floor(player.fireRate * .35)) : activePU.laser > 0 ? 3 : player.fireRate;
      playSFX('shoot');
    }

    function addCombo() {
      combo++; comboTimer = 180; if (combo > maxCombo) maxCombo = combo;
      if (combo >= 3) {
        DOM.combo.textContent = '× ' + combo + ' COMBO'; DOM.combo.style.opacity = '1';
        DOM.combo.style.color = combo >= 8 ? '#ff4466' : combo >= 5 ? '#ffaa00' : '#ffff00';
      }
    }

    function update() {
      if (!gameRunning || gamePaused) return;
      // screen shake decay
      if (shake.dur > 0) { shake.dur--; shake.x *= 0.8; shake.y *= 0.8; } else { shake.x = 0; shake.y = 0; }

      let dx = 0, dy = 0;
      if (keys['ArrowLeft'] || keys['a'] || keys['A']) dx -= 1; if (keys['ArrowRight'] || keys['d'] || keys['D']) dx += 1;
      if (keys['ArrowUp'] || keys['w'] || keys['W']) dy -= 1; if (keys['ArrowDown'] || keys['s'] || keys['S']) dy += 1;
      if (leftStick.active) { dx += leftStick.dx; dy += leftStick.dy; }
      const dl = Math.hypot(dx, dy); if (dl > 1) { dx /= dl; dy /= dl; }
      player.x = Math.max(player.r, Math.min(W - player.r, player.x + dx * player.speed));
      player.y = Math.max(player.r, Math.min(H - player.r, player.y + dy * player.speed));

      if (rightStick.active && (Math.abs(rightStick.dx) > .1 || Math.abs(rightStick.dy) > .1)) {
        player.angle = Math.atan2(rightStick.dy, rightStick.dx);
        mouse.x = player.x + Math.cos(player.angle) * 60; mouse.y = player.y + Math.sin(player.angle) * 60;
      } else player.angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);

      if (shootCooldown > 0) shootCooldown--;
      const ts = rightStick.active && (Math.abs(rightStick.dx) > .15 || Math.abs(rightStick.dy) > .15);
      if ((mouseDown || keys[' '] || ts) && shootCooldown <= 0) shootBullet();
      if (player.invincible > 0) player.invincible--;

      // combo timer
      if (comboTimer > 0) { comboTimer--; if (comboTimer === 0) { combo = 0; DOM.combo.style.opacity = '0'; } }

      // power-up timers
      for (const k in activePU) if (activePU[k] > 0) activePU[k] = Math.max(0, activePU[k] - 1);

      // bullets vs enemies
      outer: for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i]; b.x += b.vx; b.y += b.vy;
        if (b.x < 0 || b.x > W || b.y < 0 || b.y > H) { bullets.splice(i, 1); continue; }
        for (let j = enemies.length - 1; j >= 0; j--) {
          const e = enemies[j];
          if (dist(b, e) < b.r + e.r) {
            if (e.shielded) { e.shielded = false; spawnParts(e.x, e.y, '#44aaff', 5); if (!b.piercing) bullets.splice(i, 1); continue outer; }
            e.hp--; spawnParts(e.x, e.y, e.color, 3);
            if (!b.piercing) bullets.splice(i, 1);
            else { b.pierceCt = (b.pierceCt || 0) + 1; if (b.pierceCt > 4) bullets.splice(i, 1); }
            if (e.hp <= 0) {
              score += e.score * (combo >= 5 ? 2 : combo >= 3 ? 1.5 : 1) | 0; scoreDirty = true;
              spawnParts(e.x, e.y, e.color, 8);
              if (e.splits) {
                for (let k = 0; k < 2; k++) {
                  const ang = Math.random() * Math.PI * 2;
                  enemies.push({
                    x: e.x + Math.cos(ang) * 10, y: e.y + Math.sin(ang) * 10, r: 9, speed: e.speed * 1.5, hp: 1, maxHp: 1,
                    color: '#ff9955', score: 20, type: 'fast', angle: 0, zigDir: 1, zigTimer: 0, shielded: false, shoots: false, splits: false, shootCd: 0, shootTimer: 0
                  });
                }
              }
              if (Math.random() < 0.06) spawnHealthPack(e.x, e.y);
              if (Math.random() < 0.08) spawnPowerUp(e.x, e.y);
              enemies.splice(j, 1); addCombo(); playSFX('hit');
            }
            continue outer;
          }
        }
      }

      // enemy spawn & movement
      spawnTimer++; if (spawnTimer >= spawnInterval) { spawnEnemy(); spawnTimer = 0; }
      for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        const a = Math.atan2(player.y - e.y, player.x - e.x);
        // zigzag movement
        if (e.type === 'zigzag') {
          e.zigTimer++; if (e.zigTimer > 30) { e.zigTimer = 0; e.zigDir *= -1; }
          const perp = a + Math.PI / 2;
          const spd = e.frozen > 0 ? e.speed * .2 : e.speed;
          e.x += Math.cos(a) * spd * .8 + Math.cos(perp) * spd * .6 * e.zigDir;
          e.y += Math.sin(a) * spd * .8 + Math.sin(perp) * spd * .6 * e.zigDir;
        } else {
          const spd = e.frozen > 0 ? e.speed * .2 : e.speed;
          e.x += Math.cos(a) * spd; e.y += Math.sin(a) * spd;
        }
        e.angle = a;
        // sniper shoots
        if (e.shoots) {
          e.shootTimer++;
          if (e.shootTimer >= e.shootCd) {
            e.shootTimer = 0; const spd = 6;
            bossBullets.push({ x: e.x, y: e.y, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd, r: 4, color: e.color });
          }
        }
        // collision with player
        const shieldBlocked = e.shielded && activePU.shield > 0;
        if (dist(e, player) < e.r + player.r && player.invincible <= 0 && activePU.shield <= 0) {
          health -= e.type === 'heavy' || e.type === 'splitter' ? 24 : e.type === 'shield' ? 18 : 12;
          player.invincible = 50; spawnParts(player.x, player.y, '#ff4466', 8); triggerShake(6, 14);
          combo = 0; comboTimer = 0; DOM.combo.style.opacity = '0';
          updateHealthBar(); if (health <= 0) { endGame(); return; }
        }
      }

      // timed health pack (rare — every 10s, small heal)
      packTimer++; if (packTimer >= packInterval) {
        const m = 60; spawnHealthPack(m + Math.random() * (W - m * 2), m + Math.random() * (H - m * 2));
        packTimer = 0; packInterval = 540 + Math.random() * 240;
      }

      // health pack pickup
      for (let i = healthPacks.length - 1; i >= 0; i--) {
        const pk = healthPacks[i]; pk.pulse = (pk.pulse + .08) % (Math.PI * 2); pk.life--;
        if (pk.life <= 0) { healthPacks.splice(i, 1); continue; }
        if (dist(pk, player) < pk.r + player.r) {
          health = Math.min(maxHealth, health + Math.round(maxHealth * .15)); // only 15% heal (was 25%)
          spawnParts(pk.x, pk.y, '#00ff88', 4); healthPacks.splice(i, 1); updateHealthBar();
        }
      }

      // power-up pickup
      for (let i = powerUps.length - 1; i >= 0; i--) {
        const p = powerUps[i]; p.life--; p.pulse += .08;
        if (p.life <= 0) { powerUps.splice(i, 1); continue; }
        // magnet: pull health packs toward player
        if (activePU.magnet > 0) {
          healthPacks.forEach(pk => { const a = Math.atan2(player.y - pk.y, player.x - pk.x); pk.x += Math.cos(a) * 3; pk.y += Math.sin(a) * 3; });
        }
        if (dist(p, player) < p.r + player.r) {
          if (p.type === 'rapid') activePU.rapid = 300;
          if (p.type === 'triple') activePU.triple = 300;
          if (p.type === 'shield') activePU.shield = 300;
          if (p.type === 'magnet') activePU.magnet = 360;
          if (p.type === 'laser') activePU.laser = 240;
          if (p.type === 'freeze') { activePU.freeze = 200; enemies.forEach(e => e.frozen = 120); }
          if (p.type === 'bomb') { score += enemies.length * 15; scoreDirty = true; spawnParts(W / 2, H / 2, '#ff4466', 10); enemies = []; }
          spawnParts(p.x, p.y, p.color, 4); powerUps.splice(i, 1); playSFX('powerup');
        }
      }

      // freeze: slow enemies
      if (activePU.freeze > 0) {
        enemies.forEach(e => { if (e.frozen > 0) e.frozen--; });
      }

      // boss
      if (bossActive) updateBoss();

      // wave progression
      waveCooldown++;
      if (waveCooldown >= 600) {
        wave++; DOM.wave.textContent = wave; spawnInterval = Math.max(18, 80 - wave * 7); waveCooldown = 0;
        if (BOSS_WAVES.includes(wave)) spawnBoss(wave);
        else { showWaveAnnounce('Wave ' + wave); playSFX('wave'); }
        if (wave % 3 === 0) playMusic((currentTrack + 1) % TRACKS.length);
      }

      // particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vx *= .92; p.vy *= .92; p.life -= .03;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (scoreDirty) { DOM.score.textContent = score; scoreDirty = false; }
    }

    // ── Draw ────────────────────────────────────────────────────
    function drawPlayer() {
      const { x, y, angle, invincible, r, color, shape } = player;
      if (invincible > 0 && Math.floor(invincible / 4) % 2 === 0) return;
      const col = color || '#00ffe7';
      ctx.save(); ctx.translate(x, y); ctx.rotate(angle);
      const grd = ctx.createRadialGradient(0, 0, r, 0, 0, r * 2.5);
      grd.addColorStop(0, col + '1e'); grd.addColorStop(1, col + '00');
      ctx.fillStyle = grd; ctx.beginPath(); ctx.arc(0, 0, r * 2.5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#001a18'; ctx.strokeStyle = col; ctx.lineWidth = 1.5; ctx.shadowColor = col; ctx.shadowBlur = 12;
      ctx.beginPath();
      if (shape === 'diamond') { ctx.moveTo(r, 0); ctx.lineTo(0, -r * .8); ctx.lineTo(-r, 0); ctx.lineTo(0, r * .8); }
      else if (shape === 'hex') { for (let i = 0; i < 6; i++) { const a = i / 6 * Math.PI * 2 - Math.PI / 6; i === 0 ? ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r) : ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r); } }
      else if (shape === 'tri') { ctx.moveTo(r, 0); ctx.lineTo(-r, -r * .75); ctx.lineTo(-r, r * .75); }
      else if (shape === 'viper') { ctx.moveTo(r, 0); ctx.lineTo(-r * .6, -r * .9); ctx.lineTo(-r * .2, -r * .3); ctx.lineTo(-r * .8, 0); ctx.lineTo(-r * .2, r * .3); ctx.lineTo(-r * .6, r * .9); }
      else if (shape === 'phantom') { ctx.moveTo(r, 0); ctx.lineTo(-r * .3, -r * .5); ctx.lineTo(-r, 0); ctx.lineTo(-r * .3, r * .5); ctx.lineTo(r * .2, r * .2); ctx.lineTo(r * .2, -r * .2); }
      else if (shape === 'fortress') { ctx.moveTo(r * .7, r * .7); ctx.lineTo(-r * .7, r * .7); ctx.lineTo(-r * .7, -r * .7); ctx.lineTo(r * .7, -r * .7); ctx.closePath(); ctx.moveTo(r, 0); ctx.lineTo(r * .7, r * .7); ctx.moveTo(r, 0); ctx.lineTo(r * .7, -r * .7); }
      else { ctx.moveTo(r, 0); ctx.lineTo(-r, -r * .65); ctx.lineTo(-r * .5, 0); ctx.lineTo(-r, r * .65); }
      ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.fillStyle = col; ctx.shadowBlur = 6; ctx.beginPath(); ctx.arc(r * .2, 0, 3, 0, Math.PI * 2); ctx.fill();
      if (activePU.shield > 0) {
        ctx.strokeStyle = '#44ff88'; ctx.lineWidth = 2; ctx.shadowColor = '#44ff88'; ctx.shadowBlur = 16;
        ctx.globalAlpha = .4 + .3 * Math.sin(Date.now() * .01); ctx.beginPath(); ctx.arc(0, 0, r * 1.9, 0, Math.PI * 2); ctx.stroke(); ctx.globalAlpha = 1;
      }
      ctx.restore();
    }

    function drawEnemies() {
      for (const e of enemies) {
        ctx.save(); ctx.translate(e.x, e.y); ctx.rotate(e.angle + Math.PI);
        // frozen tint overlay
        if (e.frozen > 0) {
          ctx.globalAlpha = 0.5; ctx.fillStyle = '#88ddff'; ctx.beginPath(); ctx.arc(0, 0, e.r + 4, 0, Math.PI * 2); ctx.fill(); ctx.globalAlpha = 1;
        }
        // shield ring
        if (e.shielded) {
          ctx.strokeStyle = '#44aaff'; ctx.lineWidth = 2.5; ctx.shadowColor = '#44aaff'; ctx.shadowBlur = 12;
          ctx.beginPath(); ctx.arc(0, 0, e.r + 6, 0, Math.PI * 2); ctx.stroke();
        }
        const g2 = ctx.createRadialGradient(0, 0, e.r, 0, 0, e.r * 2.2);
        g2.addColorStop(0, e.color + '30'); g2.addColorStop(1, e.color + '00');
        ctx.fillStyle = g2; ctx.beginPath(); ctx.arc(0, 0, e.r * 2.2, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#0a0010'; ctx.strokeStyle = e.color; ctx.lineWidth = 1.5; ctx.shadowColor = e.color; ctx.shadowBlur = 10;
        const sides = e.type === 'heavy' ? 6 : e.type === 'fast' || e.type === 'sniper' ? 3 : e.type === 'splitter' ? 8 : e.type === 'zigzag' ? 5 : 4;
        ctx.beginPath(); for (let i = 0; i < sides; i++) { const a = (i / sides) * Math.PI * 2 - Math.PI / sides; i === 0 ? ctx.moveTo(Math.cos(a) * e.r, Math.sin(a) * e.r) : ctx.lineTo(Math.cos(a) * e.r, Math.sin(a) * e.r); }
        ctx.closePath(); ctx.fill(); ctx.stroke();
        if (e.maxHp > 1) for (let i = 0; i < e.maxHp; i++) { ctx.fillStyle = i < e.hp ? e.color : '#222'; ctx.shadowBlur = 0; ctx.beginPath(); ctx.arc(-e.r + i * (e.r * .5 + 2), -e.r - 7, 3, 0, Math.PI * 2); ctx.fill(); }
        ctx.restore();
      }
    }

    function drawBullets() {
      for (const b of bullets) {
        ctx.save();
        if (b.piercing) {
          // laser bolt — elongated bright beam
          ctx.shadowColor = '#ffff44'; ctx.shadowBlur = 20; ctx.fillStyle = '#ffff44';
          ctx.save(); ctx.translate(b.x, b.y); ctx.rotate(Math.atan2(b.vy, b.vx));
          ctx.beginPath(); ctx.ellipse(0, 0, b.r * 2.5, b.r, 0, 0, Math.PI * 2); ctx.fill(); ctx.restore();
        } else {
          ctx.shadowColor = b.color; ctx.shadowBlur = 14; ctx.fillStyle = b.color; ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.fill();
          ctx.strokeStyle = b.color + '44'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(b.x, b.y); ctx.lineTo(b.x - b.vx * 4, b.y - b.vy * 4); ctx.stroke();
        }
        ctx.restore();
      }
    }

    function drawParticles() {
      for (const p of particles) {
        ctx.save(); ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.shadowColor = p.color; ctx.shadowBlur = 6;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2); ctx.fill(); ctx.restore();
      }
    }

    function drawHealthPacks() {
      for (const pk of healthPacks) {
        const fade = pk.life < 100 ? pk.life / 100 : 1, glow = 6 + Math.sin(pk.pulse) * 4;
        ctx.save(); ctx.globalAlpha = fade; ctx.shadowColor = '#00ff88'; ctx.shadowBlur = glow * 2;
        ctx.strokeStyle = '#00ff88'; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.arc(pk.x, pk.y, pk.r, 0, Math.PI * 2); ctx.stroke();
        ctx.fillStyle = '#00ff88'; const arm = pk.r * .5, thick = pk.r * .22;
        ctx.fillRect(pk.x - thick, pk.y - arm, thick * 2, arm * 2); ctx.fillRect(pk.x - arm, pk.y - thick, arm * 2, thick * 2); ctx.restore();
      }
    }

    function drawCrosshair() {
      const { x, y } = mouse;
      ctx.save(); ctx.strokeStyle = '#00ffe7'; ctx.lineWidth = 1; ctx.shadowColor = '#00ffe7'; ctx.shadowBlur = 6; ctx.globalAlpha = .75;
      const s = 10, g = 5; ctx.beginPath(); ctx.moveTo(x - s - g, y); ctx.lineTo(x - g, y); ctx.moveTo(x + g, y); ctx.lineTo(x + s + g, y); ctx.moveTo(x, y - s - g); ctx.lineTo(x, y - g); ctx.moveTo(x, y + g); ctx.lineTo(x, y + s + g); ctx.stroke();
      ctx.beginPath(); ctx.arc(x, y, 2, 0, Math.PI * 2); ctx.fillStyle = '#00ffe7'; ctx.fill(); ctx.restore();
    }

    function drawJoystick(st) {
      if (!st.active) return;
      ctx.save(); ctx.globalAlpha = .35; ctx.strokeStyle = '#00ffe7'; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.arc(st.baseX, st.baseY, SR, 0, Math.PI * 2); ctx.stroke();
      const kx = st.baseX + st.dx * SR, ky = st.baseY + st.dy * SR; ctx.globalAlpha = .6; ctx.fillStyle = '#00ffe7'; ctx.shadowColor = '#00ffe7'; ctx.shadowBlur = 8; ctx.beginPath(); ctx.arc(kx, ky, SK, 0, Math.PI * 2); ctx.fill(); ctx.restore();
    }

    function draw() {
      ctx.save();
      if (shake.dur > 0) ctx.translate((Math.random() - .5) * shake.x, (Math.random() - .5) * shake.y);
      drawBG(); drawParticles(); drawHealthPacks(); drawPowerUps();
      drawBullets(); drawEnemies(); drawBoss();
      if (gameRunning) drawPlayer();
      // freeze screen tint
      if (activePU.freeze > 0) {
        ctx.fillStyle = `rgba(136,221,255,${0.07 * (activePU.freeze / 200)})`; ctx.fillRect(0, 0, W, H);
      }
      // magnet ring
      if (activePU.magnet > 0 && gameRunning) {
        ctx.save(); ctx.strokeStyle = '#ff88ff'; ctx.lineWidth = 1; ctx.globalAlpha = 0.25 + 0.2 * Math.sin(bgTick * 8);
        ctx.shadowColor = '#ff88ff'; ctx.shadowBlur = 8; ctx.beginPath(); ctx.arc(player.x, player.y, 120, 0, Math.PI * 2); ctx.stroke(); ctx.restore();
      }
      drawCrosshair(); if (gameRunning) drawActivePU();
      drawJoystick(leftStick); drawJoystick(rightStick);
      ctx.restore();
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }

    // ── Game Flow ────────────────────────────────────────────────
    function showWaveAnnounce(text) {
      DOM.wAnn.textContent = text; DOM.wAnn.style.opacity = '1';
      setTimeout(() => DOM.wAnn.style.opacity = '0', 1600);
    }

    function startGame() {
      initAC(); if (AC && AC.state === 'suspended') AC.resume();
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      DOM.pauseBtn.style.display = 'block';
      initGame(); gameRunning = true; gamePaused = false;
      showWaveAnnounce('Wave 1'); playMusic(0);
    }

    function pauseGame() {
      if (!gameRunning || gamePaused) return;
      gamePaused = true; DOM.pauseInf.textContent = 'Score: ' + score + ' · Wave ' + wave;
      showScreen('s-pause'); DOM.pauseBtn.textContent = '▶ Resume';
    }

    function resumeGame() {
      gamePaused = false; document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      DOM.pauseBtn.textContent = '⏸ Pause';
    }

    function quitToMenu() {
      gameRunning = false; gamePaused = false; stopMusic();
      DOM.pauseBtn.style.display = 'none'; DOM.pauseBtn.textContent = '⏸ Pause';
      DOM.musicBar.classList.remove('on'); showScreen('s-main');
    }

    function endGame() {
      gameRunning = false; playSFX('die');
      DOM.goScore.textContent = 'Score: ' + score;
      DOM.goWave.textContent = 'Wave ' + wave + ' reached';
      DOM.goCombo.textContent = 'Best combo: ×' + maxCombo;
      showScreen('s-over'); DOM.pauseBtn.style.display = 'none'; stopMusic();
    }

    // ── Input ────────────────────────────────────────────────────
    DOM.pauseBtn.addEventListener('click', () => { if (gamePaused) resumeGame(); else pauseGame(); });
    canvas.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
    canvas.addEventListener('mousedown', () => { mouseDown = true; });
    canvas.addEventListener('mouseup', () => { mouseDown = false; });
    canvas.style.cursor = 'none';
    document.addEventListener('keydown', e => {
      keys[e.key] = true;
      if ([' ', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) e.preventDefault();
      if (e.key === 'Escape' || e.key === 'p' || e.key === 'P') { if (gamePaused) resumeGame(); else if (gameRunning) pauseGame(); }
    });
    document.addEventListener('keyup', e => { keys[e.key] = false; });

    function handleTouchStart(e) {
      e.preventDefault();
      for (const t of e.changedTouches) {
        const st = t.clientX < W / 2 ? leftStick : rightStick;
        if (!st.active) { st.active = true; st.id = t.identifier; st.baseX = t.clientX; st.baseY = t.clientY; st.dx = 0; st.dy = 0; }
      }
    }
    function handleTouchMove(e) {
      e.preventDefault();
      for (const t of e.changedTouches) for (const st of [leftStick, rightStick]) if (st.id === t.identifier) {
        const rx = t.clientX - st.baseX, ry = t.clientY - st.baseY, len = Math.hypot(rx, ry), cl = Math.min(len, SR);
        st.dx = (rx / (len || 1)) * (cl / SR); st.dy = (ry / (len || 1)) * (cl / SR);
      }
    }
    function handleTouchEnd(e) {
      e.preventDefault();
      for (const t of e.changedTouches) for (const st of [leftStick, rightStick]) if (st.id === t.identifier) { st.active = false; st.id = null; st.dx = 0; st.dy = 0; }
    }
    canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
    canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
    canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
    canvas.addEventListener('touchcancel', handleTouchEnd, { passive: false });

    initBG(); loop();
  </script>
</body>

</html>
